<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="Satoshi, system-ui, sans-serif" role="img" aria-label="Six capabilities unlocked by programmable seals: chain-enforced swaps, lending on RGB collateral, trustless dollar issuance, vault custody, protected maker inventory, and privacy with programmability">
  <defs>
    <linearGradient id="gv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15E99A"/>
      <stop offset="1" stop-color="#6F32FF"/>
    </linearGradient>
    <linearGradient id="strip" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1200" y2="6">
      <stop offset="0" stop-color="#15E99A"/>
      <stop offset="1" stop-color="#6F32FF"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#FFFFFF" opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="#0D1813"/>
  <rect width="1200" height="675" fill="url(#dots)"/>
  <rect x="0" y="0" width="1200" height="5" fill="url(#strip)"/>

  <!-- eyebrow chip -->
  <rect x="80" y="56" width="330" height="34" rx="17" fill="#111110" stroke="#3D3D3A"/>
  <circle cx="102" cy="73" r="4" fill="#15E99A"/>
  <text x="118" y="78" fill="#6EEDC0" font-size="13.5" font-weight="500" letter-spacing="2.5">PROGRAMMABLE SEALS</text>
  <text x="432" y="78" fill="#9A9A94" font-size="14">what Simplicity covenants unlock for RGB assets on Liquid</text>

  <!-- ══════ row 1 ══════ -->
  <!-- card 1: chain-enforced swaps (demonstrated) -->
  <g filter="url(#soft)">
    <rect x="80" y="118" width="330" height="222" rx="14" fill="#111110" stroke="url(#gv)" stroke-width="2"/>
  </g>
  <rect x="104" y="142" width="44" height="44" rx="10" fill="#0D1813" stroke="#15E99A" stroke-width="1.5"/>
  <g fill="none" stroke="#15E99A" stroke-width="1.8">
    <rect x="115" y="155" width="13" height="13" transform="rotate(45 121.5 161.5)"/>
    <rect x="124" y="164" width="13" height="13" transform="rotate(45 130.5 170.5)"/>
  </g>
  <text x="104" y="216" fill="#FFFFFF" font-size="16.5" font-weight="700" letter-spacing="-0.2">Chain-enforced swaps</text>
  <text x="104" y="242" fill="#9A9A94" font-size="13">The spend must reveal the secret and</text>
  <text x="104" y="261" fill="#9A9A94" font-size="13">anchor the RGB transfer, or it never</text>
  <text x="104" y="280" fill="#9A9A94" font-size="13">enters a block.</text>
  <rect x="104" y="296" width="128" height="24" rx="12" fill="#15E99A"/>
  <text x="168" y="312" fill="#0D1813" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1">DEMONSTRATED</text>

  <!-- card 2: lending -->
  <rect x="435" y="118" width="330" height="222" rx="14" fill="#111110" stroke="#3D3D3A"/>
  <rect x="459" y="142" width="44" height="44" rx="10" fill="#0D1813" stroke="#A48AFF" stroke-width="1.5"/>
  <g stroke="#A48AFF" stroke-width="1.8" fill="none">
    <line x1="481" y1="152" x2="481" y2="176"/>
    <line x1="470" y1="158" x2="492" y2="158"/>
    <path d="M 470 158 L 465 168 A 6 6 0 0 0 475 168 Z"/>
    <path d="M 492 158 L 487 168 A 6 6 0 0 0 497 168 Z"/>
  </g>
  <text x="459" y="216" fill="#FFFFFF" font-size="16.5" font-weight="700" letter-spacing="-0.2">Lending on RGB collateral</text>
  <text x="459" y="242" fill="#9A9A94" font-size="13">Loan terms become consensus rules:</text>
  <text x="459" y="261" fill="#9A9A94" font-size="13">repay and the collateral returns, default</text>
  <text x="459" y="280" fill="#9A9A94" font-size="13">and it settles. Positions stay private.</text>

  <!-- card 3: dollar issuance -->
  <rect x="790" y="118" width="330" height="222" rx="14" fill="#111110" stroke="#3D3D3A"/>
  <rect x="814" y="142" width="44" height="44" rx="10" fill="#0D1813" stroke="#15E99A" stroke-width="1.5"/>
  <g stroke="#15E99A" stroke-width="1.8" fill="none">
    <circle cx="836" cy="164" r="11"/>
    <path d="M 836 157 L 836 171 M 831.5 168 A 4 4 0 0 0 840 168 A 3.5 3.5 0 0 0 832 160.5 A 4 4 0 0 1 840.5 160.5"/>
  </g>
  <text x="814" y="216" fill="#FFFFFF" font-size="16.5" font-weight="700" letter-spacing="-0.2">Trustless dollar issuance</text>
  <text x="814" y="242" fill="#9A9A94" font-size="13">RGB dollars minted against locked USDt.</text>
  <text x="814" y="261" fill="#9A9A94" font-size="13">Every holder verifies the backing;</text>
  <text x="814" y="280" fill="#9A9A94" font-size="13">reserves are public in real time.</text>

  <!-- ══════ row 2 ══════ -->
  <!-- card 4: vault custody -->
  <rect x="80" y="366" width="330" height="222" rx="14" fill="#111110" stroke="#3D3D3A"/>
  <rect x="104" y="390" width="44" height="44" rx="10" fill="#0D1813" stroke="#A48AFF" stroke-width="1.5"/>
  <path d="M 126 399 L 138 404 L 138 414 Q 138 424 126 429 Q 114 424 114 414 L 114 404 Z" fill="none" stroke="#A48AFF" stroke-width="1.8"/>
  <circle cx="126" cy="413" r="2.5" fill="#A48AFF"/>
  <text x="104" y="464" fill="#FFFFFF" font-size="16.5" font-weight="700" letter-spacing="-0.2">Vault custody</text>
  <text x="104" y="490" fill="#9A9A94" font-size="13">A recovery window on every spend turns</text>
  <text x="104" y="509" fill="#9A9A94" font-size="13">key theft into a race the legitimate</text>
  <text x="104" y="528" fill="#9A9A94" font-size="13">owner can win.</text>

  <!-- card 5: maker inventory -->
  <rect x="435" y="366" width="330" height="222" rx="14" fill="#111110" stroke="#3D3D3A"/>
  <rect x="459" y="390" width="44" height="44" rx="10" fill="#0D1813" stroke="#15E99A" stroke-width="1.5"/>
  <g stroke="#15E99A" stroke-width="1.8" fill="none">
    <rect x="470" y="406" width="22" height="16" rx="3"/>
    <path d="M 475 406 L 475 401 A 6 6 0 0 1 487 401 L 487 406"/>
  </g>
  <text x="459" y="464" fill="#FFFFFF" font-size="16.5" font-weight="700" letter-spacing="-0.2">Protected maker inventory</text>
  <text x="459" y="490" fill="#9A9A94" font-size="13">Hot wallets that can only spend into</text>
  <text x="459" y="509" fill="#9A9A94" font-size="13">swap-shaped outputs. Stolen keys</text>
  <text x="459" y="528" fill="#9A9A94" font-size="13">cannot drain the float.</text>

  <!-- card 6: privacy -->
  <rect x="790" y="366" width="330" height="222" rx="14" fill="#111110" stroke="#3D3D3A"/>
  <rect x="814" y="390" width="44" height="44" rx="10" fill="#0D1813" stroke="#A48AFF" stroke-width="1.5"/>
  <g stroke="#A48AFF" stroke-width="1.8" fill="none">
    <path d="M 824 412 Q 836 400 848 412 Q 836 424 824 412 Z"/>
    <circle cx="836" cy="412" r="3.5"/>
    <line x1="826" y1="424" x2="846" y2="400"/>
  </g>
  <text x="814" y="464" fill="#FFFFFF" font-size="16.5" font-weight="700" letter-spacing="-0.2">Privacy with programmability</text>
  <text x="814" y="490" fill="#9A9A94" font-size="13">Covenant rules on the container while</text>
  <text x="814" y="509" fill="#9A9A94" font-size="13">amounts and history stay off-chain.</text>
  <text x="814" y="528" fill="#9A9A94" font-size="13">No tradeoff to make.</text>

  <!-- footer line -->
  <text x="600" y="634" fill="#9A9A94" font-size="14" text-anchor="middle">The chain enforces the container. <tspan fill="#FFFFFF" font-weight="500">Client-side validation enforces the contents.</tspan></text>
</svg>
