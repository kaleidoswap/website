<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="Satoshi, system-ui, sans-serif" role="img" aria-label="The RGB-wrapped HTLC claim: one transaction settles the swap, closes the seal, and anchors the next RGB transition">
  <defs>
    <linearGradient id="gv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15E99A"/>
      <stop offset="1" stop-color="#6F32FF"/>
    </linearGradient>
    <linearGradient id="strip" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1200" y2="6">
      <stop offset="0" stop-color="#15E99A"/>
      <stop offset="1" stop-color="#6F32FF"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#FFFFFF" opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="#0D1813"/>
  <rect width="1200" height="675" fill="url(#dots)"/>
  <rect x="0" y="0" width="1200" height="5" fill="url(#strip)"/>

  <!-- eyebrow chip -->
  <rect x="80" y="58" width="268" height="34" rx="17" fill="#111110" stroke="#3D3D3A"/>
  <circle cx="102" cy="75" r="4" fill="#15E99A"/>
  <text x="118" y="80" fill="#6EEDC0" font-size="13.5" font-weight="500" letter-spacing="2.5">RGB-WRAPPED CLAIM</text>
  <text x="370" y="80" fill="#9A9A94" font-size="14">one transaction, three jobs, demonstrated on Liquid regtest</text>

  <!-- ══════ left: the HTLC utxo that IS the seal ══════ -->
  <rect x="80" y="268" width="236" height="136" rx="12" fill="#111110" stroke="#6F32FF" stroke-width="2"/>
  <rect x="80" y="268" width="4" height="136" rx="2" fill="#6F32FF"/>
  <circle cx="112" cy="302" r="5" fill="#6F32FF"/>
  <text x="128" y="308" fill="#FFFFFF" font-size="16" font-weight="500">HTLC output</text>
  <line x1="104" y1="324" x2="292" y2="324" stroke="#3D3D3A" stroke-width="1"/>
  <text x="104" y="349" fill="#A48AFF" font-size="13.5">hashlock + CSV refund</text>
  <text x="104" y="372" fill="#FFFFFF" font-size="13.5" font-weight="500">…and it IS the RGB seal</text>

  <line x1="316" y1="336" x2="392" y2="336" stroke="#6F32FF" stroke-width="2.5"/>
  <polygon points="402,336 388,329 388,343" fill="#6F32FF"/>

  <!-- ══════ center: the claim transaction ══════ -->
  <g filter="url(#soft)">
    <rect x="402" y="118" width="380" height="452" rx="14" fill="#111110" stroke="url(#gv)" stroke-width="2.5"/>
  </g>
  <rect x="404.5" y="120.5" width="375" height="48" rx="12" fill="#0D1813"/>
  <rect x="428" y="136" width="15" height="15" transform="rotate(45 435.5 143.5)" fill="none" stroke="url(#gv)" stroke-width="2"/>
  <text x="458" y="150" fill="#FFFFFF" font-size="17" font-weight="700" letter-spacing="-0.3">the claim transaction</text>
  <line x1="404" y1="168.5" x2="779" y2="168.5" stroke="#3D3D3A" stroke-width="1"/>

  <!-- vin row -->
  <rect x="426" y="188" width="332" height="82" rx="10" fill="#0D1813" stroke="#3D3D3A"/>
  <rect x="426" y="188" width="4" height="82" rx="2" fill="#6F32FF"/>
  <rect x="446" y="202" width="64" height="22" rx="11" fill="#111110" stroke="#6F32FF" stroke-width="1"/>
  <text x="478" y="217" fill="#A48AFF" font-size="12" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">vin[0]</text>
  <text x="446" y="244" fill="#FFFFFF" font-size="14.5" font-weight="500">spends the HTLC = closes the seal</text>
  <text x="446" y="263" fill="#9A9A94" font-size="13">witness carries the preimage, in cleartext</text>

  <!-- vout rows -->
  <rect x="426" y="286" width="332" height="76" rx="10" fill="#0D1813" stroke="#3D3D3A"/>
  <rect x="426" y="286" width="4" height="76" rx="2" fill="url(#gv)"/>
  <rect x="446" y="300" width="72" height="22" rx="11" fill="#111110" stroke="#15E99A" stroke-width="1"/>
  <text x="482" y="315" fill="#6EEDC0" font-size="12" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">vout[0]</text>
  <text x="446" y="342" fill="#FFFFFF" font-size="14.5" font-weight="500">tapret commitment → MPC root</text>

  <rect x="426" y="378" width="332" height="76" rx="10" fill="#0D1813" stroke="#3D3D3A"/>
  <rect x="426" y="378" width="4" height="76" rx="2" fill="#15E99A"/>
  <rect x="446" y="392" width="72" height="22" rx="11" fill="#111110" stroke="#15E99A" stroke-width="1"/>
  <text x="482" y="407" fill="#6EEDC0" font-size="12" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">vout[1]</text>
  <text x="446" y="434" fill="#FFFFFF" font-size="14.5" font-weight="500">claimer's output: the asset's new seal</text>

  <rect x="426" y="470" width="332" height="58" rx="10" fill="#0D1813" stroke="#3D3D3A"/>
  <rect x="426" y="470" width="4" height="58" rx="2" fill="#3D3D3A"/>
  <rect x="446" y="484" width="72" height="22" rx="11" fill="#111110" stroke="#3D3D3A" stroke-width="1"/>
  <text x="482" y="499" fill="#9A9A94" font-size="12" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">vout[2]</text>
  <text x="534" y="500" fill="#9A9A94" font-size="14">explicit fee</text>

  <!-- ══════ right: the three jobs ══════ -->
  <path d="M 758 229 C 830 229, 810 193, 882 193" stroke="#6F32FF" stroke-width="2" fill="none"/>
  <rect x="886" y="150" width="234" height="86" rx="12" fill="#111110" stroke="#3D3D3A"/>
  <circle cx="918" cy="180" r="14" fill="#6F32FF"/>
  <text x="918" y="185" fill="#FFFFFF" font-size="14" font-weight="700" text-anchor="middle">1</text>
  <text x="944" y="177" fill="#FFFFFF" font-size="15" font-weight="500">the swap settles</text>
  <text x="944" y="199" fill="#9A9A94" font-size="13">preimage goes public; the</text>
  <text x="944" y="217" fill="#9A9A94" font-size="13">counterparty claims their leg</text>

  <path d="M 758 324 C 830 324, 810 337, 882 337" stroke="#15E99A" stroke-width="2" fill="none"/>
  <rect x="886" y="294" width="234" height="86" rx="12" fill="#111110" stroke="#3D3D3A"/>
  <circle cx="918" cy="324" r="14" fill="url(#gv)"/>
  <text x="918" y="329" fill="#0D1813" font-size="14" font-weight="700" text-anchor="middle">2</text>
  <text x="944" y="321" fill="#FFFFFF" font-size="15" font-weight="500">the transition anchors</text>
  <text x="944" y="343" fill="#9A9A94" font-size="13">verified by the patched</text>
  <text x="944" y="361" fill="#9A9A94" font-size="13">Anchor::verify, on Liquid</text>

  <path d="M 758 416 C 830 416, 810 481, 882 481" stroke="#15E99A" stroke-width="2" fill="none"/>
  <rect x="886" y="438" width="234" height="86" rx="12" fill="#111110" stroke="#3D3D3A"/>
  <circle cx="918" cy="468" r="14" fill="#15E99A"/>
  <text x="918" y="473" fill="#0D1813" font-size="14" font-weight="700" text-anchor="middle">3</text>
  <text x="944" y="465" fill="#FFFFFF" font-size="15" font-weight="500">the asset re-seats</text>
  <text x="944" y="487" fill="#9A9A94" font-size="13">new seal fully controlled</text>
  <text x="944" y="505" fill="#9A9A94" font-size="13">by the claimer</text>

  <!-- footer bar -->
  <rect x="80" y="600" width="1040" height="46" rx="12" fill="#111110" stroke="#3D3D3A"/>
  <rect x="80" y="600" width="4" height="46" rx="2" fill="url(#gv)"/>
  <text x="108" y="628" fill="#FFFFFF" font-size="14.5" font-weight="500">Atomic by construction: <tspan fill="#9A9A94" font-weight="400">all three happen in one transaction, or none of them do.</tspan></text>
</svg>
