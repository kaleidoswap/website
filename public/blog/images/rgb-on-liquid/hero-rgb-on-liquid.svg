<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Two crystalline chains, one green and one violet, converging on a shared glowing facet">
  <defs>
    <linearGradient id="gv" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15E99A"/>
      <stop offset="1" stop-color="#6F32FF"/>
    </linearGradient>
    <linearGradient id="gvd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17B581"/>
      <stop offset="1" stop-color="#5420CC"/>
    </linearGradient>
    <linearGradient id="strip" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1200" y2="6">
      <stop offset="0" stop-color="#15E99A"/>
      <stop offset="1" stop-color="#6F32FF"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.75">
      <stop offset="0.45" stop-color="#0D1813" stop-opacity="0"/>
      <stop offset="1" stop-color="#060D09" stop-opacity="0.9"/>
    </radialGradient>
    <radialGradient id="centerhalo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#15E99A" stop-opacity="0.14"/>
      <stop offset="0.55" stop-color="#6F32FF" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#0D1813" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#FFFFFF" opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#0D1813"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- faint 135° guide lines -->
  <g stroke="#15E99A" stroke-width="1" opacity="0.05">
    <line x1="-100" y1="80" x2="700" y2="880"/>
    <line x1="100" y1="-80" x2="900" y2="720"/>
    <line x1="300" y1="-160" x2="1100" y2="640"/>
  </g>
  <g stroke="#6F32FF" stroke-width="1" opacity="0.055">
    <line x1="1300" y1="100" x2="500" y2="900"/>
    <line x1="1200" y1="-60" x2="400" y2="740"/>
    <line x1="1000" y1="-140" x2="200" y2="660"/>
  </g>

  <!-- central halo -->
  <rect x="200" y="0" width="800" height="630" fill="url(#centerhalo)"/>

  <!-- large ghost diamonds behind the composition -->
  <g fill="none" stroke-width="1">
    <polygon points="600,55 860,315 600,575 340,315" stroke="#15E99A" opacity="0.10"/>
    <polygon points="600,110 805,315 600,520 395,315" stroke="#6F32FF" opacity="0.10"/>
  </g>

  <!-- left chain: green diamonds marching to center -->
  <g fill="#15E99A" fill-opacity="0.05" stroke="#15E99A" stroke-width="2">
    <polygon points="120,315 165,270 210,315 165,360" opacity="0.30"/>
    <polygon points="230,315 280,265 330,315 280,365" opacity="0.5"/>
    <polygon points="352,315 407,260 462,315 407,370" opacity="0.7"/>
    <polygon points="484,315 544,255 604,315 544,375" opacity="0.95"/>
  </g>
  <!-- inner facets of green diamonds -->
  <g stroke="#15E99A" stroke-width="1" opacity="0.3">
    <line x1="280" y1="265" x2="280" y2="365"/>
    <line x1="407" y1="260" x2="407" y2="370"/>
    <line x1="544" y1="255" x2="544" y2="375"/>
  </g>
  <g stroke="#15E99A" stroke-width="1.5" opacity="0.5">
    <line x1="210" y1="315" x2="230" y2="315"/>
    <line x1="330" y1="315" x2="352" y2="315"/>
    <line x1="462" y1="315" x2="484" y2="315"/>
  </g>
  <!-- link nodes -->
  <g fill="#15E99A" opacity="0.7">
    <circle cx="220" cy="315" r="2.5"/>
    <circle cx="341" cy="315" r="2.5"/>
    <circle cx="473" cy="315" r="2.5"/>
  </g>

  <!-- right chain: violet diamonds marching to center -->
  <g fill="#6F32FF" fill-opacity="0.06" stroke="#6F32FF" stroke-width="2">
    <polygon points="1080,315 1035,270 990,315 1035,360" opacity="0.30"/>
    <polygon points="970,315 920,265 870,315 920,365" opacity="0.5"/>
    <polygon points="848,315 793,260 738,315 793,370" opacity="0.7"/>
    <polygon points="716,315 656,255 596,315 656,375" opacity="0.95"/>
  </g>
  <g stroke="#6F32FF" stroke-width="1" opacity="0.3">
    <line x1="920" y1="265" x2="920" y2="365"/>
    <line x1="793" y1="260" x2="793" y2="370"/>
    <line x1="656" y1="255" x2="656" y2="375"/>
  </g>
  <g stroke="#6F32FF" stroke-width="1.5" opacity="0.5">
    <line x1="990" y1="315" x2="970" y2="315"/>
    <line x1="870" y1="315" x2="848" y2="315"/>
    <line x1="738" y1="315" x2="716" y2="315"/>
  </g>
  <g fill="#6F32FF" opacity="0.7">
    <circle cx="980" cy="315" r="2.5"/>
    <circle cx="859" cy="315" r="2.5"/>
    <circle cx="727" cy="315" r="2.5"/>
  </g>

  <!-- shared central facet -->
  <g filter="url(#glow)">
    <polygon points="600,220 695,315 600,410 505,315" fill="#0D1813" stroke="url(#gv)" stroke-width="3"/>
  </g>
  <!-- kaleidoscopic inner facets -->
  <g stroke-width="1.5" opacity="0.9">
    <line x1="600" y1="220" x2="600" y2="410" stroke="#6EEDC0" opacity="0.55"/>
    <line x1="505" y1="315" x2="695" y2="315" stroke="url(#gvd)"/>
    <line x1="552.5" y1="267.5" x2="647.5" y2="362.5" stroke="#15E99A" opacity="0.55"/>
    <line x1="647.5" y1="267.5" x2="552.5" y2="362.5" stroke="#6F32FF" opacity="0.55"/>
  </g>
  <!-- inner diamond + core -->
  <polygon points="600,272 643,315 600,358 557,315" fill="none" stroke="url(#gv)" stroke-width="1.5" opacity="0.85"/>
  <circle cx="600" cy="315" r="7" fill="url(#gv)" filter="url(#soft)"/>
  <circle cx="600" cy="315" r="2.5" fill="#FFFFFF"/>

  <!-- kaleidoscope shards above / below center -->
  <g stroke-width="1.5">
    <polygon points="600,128 642,190 558,190" fill="#6F32FF" fill-opacity="0.10" stroke="#6F32FF" opacity="0.6"/>
    <polygon points="600,502 642,440 558,440" fill="#15E99A" fill-opacity="0.10" stroke="#15E99A" opacity="0.6"/>
    <polygon points="600,86 620,116 580,116" fill="none" stroke="#6F32FF" opacity="0.35"/>
    <polygon points="600,544 620,514 580,514" fill="none" stroke="#15E99A" opacity="0.35"/>
    <polygon points="600,58 611,74 589,74" fill="none" stroke="#6F32FF" opacity="0.18"/>
    <polygon points="600,572 611,556 589,556" fill="none" stroke="#15E99A" opacity="0.18"/>
  </g>

  <!-- scattered facets -->
  <g stroke-width="1.5" fill="none">
    <polygon points="150,120 178,148 150,176 122,148" stroke="#15E99A" opacity="0.28"/>
    <polygon points="1050,510 1078,538 1050,566 1022,538" stroke="#6F32FF" opacity="0.28"/>
    <polygon points="1090,140 1112,162 1090,184 1068,162" stroke="#6F32FF" opacity="0.22"/>
    <polygon points="110,490 132,512 110,534 88,512" stroke="#15E99A" opacity="0.22"/>
    <polygon points="330,520 346,536 330,552 314,536" stroke="#15E99A" opacity="0.18"/>
    <polygon points="880,105 896,121 880,137 864,121" stroke="#6F32FF" opacity="0.18"/>
    <polygon points="250,95 260,105 250,115 240,105" stroke="#15E99A" opacity="0.15"/>
    <polygon points="955,545 965,555 955,565 945,555" stroke="#6F32FF" opacity="0.15"/>
  </g>
  <!-- tiny star points -->
  <g fill="#FFFFFF">
    <circle cx="420" cy="130" r="1.4" opacity="0.35"/>
    <circle cx="790" cy="520" r="1.4" opacity="0.35"/>
    <circle cx="985" cy="230" r="1.2" opacity="0.25"/>
    <circle cx="215" cy="435" r="1.2" opacity="0.25"/>
    <circle cx="700" cy="95" r="1.1" opacity="0.2"/>
    <circle cx="500" cy="540" r="1.1" opacity="0.2"/>
  </g>

  <!-- vignette + brand strip -->
  <rect width="1200" height="630" fill="url(#vignette)"/>
  <rect x="0" y="0" width="1200" height="5" fill="url(#strip)"/>
</svg>
